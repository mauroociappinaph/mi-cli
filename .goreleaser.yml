# .goreleaser.yml - Configuración de GoReleaser para releases automáticos
# Documentación: https://goreleaser.com/customization/

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: mi-cli
    main: .
    binary: mi-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    tags:
      - netgo

archives:
  - id: default
    builds:
      - mi-cli
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: tuusuario
    name: mi-cli
  header: "# Changelog\n"
  footer: "\n---\nReleased by [GoReleaser](https://goreleaser.com)"

brews:
  - tap:
      owner: tuusuario
      name: homebrew-tap
    folder: Formula
    homepage: "https://github.com/tuusuario/mi-cli"
    description: "Un CLI moderno y rápido construido con Go + Cobra"
    license: "MIT"
    dependencies: []
    test: |
      system "#{bin}/mi-cli version"

scoop:
  bucket:
    owner: tuusuario
    name: scoop-bucket
  homepage: "https://github.com/tuusuario/mi-cli"
  description: "Un CLI moderno y rápido construido con Go + Cobra"
  license: "MIT"

winget:
  bucket:
    owner: tuusuario
    name: winget-pkgs
  copyright: "Copyright (c) 2024 Tu Nombre"
  description: "Un CLI moderno y rápido construido con Go + Cobra"
  license: "MIT"
  moniker: mi-cli

docker:
  - image_templates:
      - "ghcr.io/tuusuario/mi-cli:{{ .Tag }}"
      - "ghcr.io/tuusuario/mi-cli:latest"
    build_flag_templates:
      - "--platform=linux/amd64,linux/arm64"
    dockerfile: Dockerfile
    goos: linux
    goarch:
      - amd64
      - arm64

nfpms:
  - id: deb
    package_name: mi-cli
    maintainer: "Tu Nombre <tu@email.com>"
    description: "Un CLI moderno y rápido construido con Go + Cobra"
    license: "MIT"
    vendor: "tuusuario"
    homepage: "https://github.com/tuusuario/mi-cli"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    overrides:
      deb:
        compression: zstd
        compression_level: 3