name: SDD Autonomous Loop

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  sdd-autonomous:
    if: github.event.label.name == 'autonomous' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js (for opencode)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install opencode
        run: npm install -g @opencode/opencode@latest

      - name: Configure opencode
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/opencode.json << 'EOF'
          {
            "mcpServers": {
              "github": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-github"],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": "${{ secrets.GITHUB_TOKEN }}"
                }
              },
              "engram": {
                "command": "npx",
                "args": ["-y", "@gentleman-programming/engram-mcp"]
              }
            }
          }
          EOF

      - name: Get issue details
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          # Fetch issue body and title
          ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUM)
          echo "issue_title=$(echo "$ISSUE_DATA" | jq -r .title)" >> $GITHUB_OUTPUT
          echo "issue_body=$(echo "$ISSUE_DATA" | jq -r .body)" >> $GITHUB_OUTPUT

      - name: Run SDD Autonomous Loop
        id: sdd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.issue.outputs.issue_body }}
        run: |
          set -e
          
          # Create branch for this issue
          BRANCH="sdd/issue-${ISSUE_NUMBER}-$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-50)"
          git checkout -b "$BRANCH"
          
          # Phase 1: PROPOSE - Create SDD proposal
          echo "=== SDD Phase 1: PROPOSE ==="
          opencode run --agent gentle-orchestrator "sdd propose --issue $ISSUE_NUMBER --title \"$ISSUE_TITLE\" --body \"$ISSUE_BODY\"" || true
          
          # Phase 2: SPEC - Write delta specs
          echo "=== SDD Phase 2: SPEC ==="
          opencode run --agent gentle-orchestrator "sdd spec --issue $ISSUE_NUMBER" || true
          
          # Phase 3: DESIGN - Technical design
          echo "=== SDD Phase 3: DESIGN ==="
          opencode run --agent gentle-orchestrator "sdd design --issue $ISSUE_NUMBER" || true
          
          # Phase 4: TASKS - Break into implementation tasks
          echo "=== SDD Phase 4: TASKS ==="
          opencode run --agent gentle-orchestrator "sdd tasks --issue $ISSUE_NUMBER" || true
          
          # Phase 5: APPLY - Implement tasks
          echo "=== SDD Phase 5: APPLY ==="
          opencode run --agent sdd-apply "sdd apply --issue $ISSUE_NUMBER" || true
          
          # Phase 6: VERIFY - Run tests and verify
          echo "=== SDD Phase 6: VERIFY ==="
          opencode run --agent sdd-verify "sdd verify --issue $ISSUE_NUMBER" || true
          
          # Phase 7: ARCHIVE - Sync delta specs
          echo "=== SDD Phase 7: ARCHIVE ==="
          opencode run --agent gentle-orchestrator "sdd archive --issue $ISSUE_NUMBER" || true
          
          # Push branch
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.sdd.outputs.branch }}
          base: main
          title: "SDD: ${{ steps.issue.outputs.issue_title }} (#${{ steps.issue.outputs.issue_number }})"
          body: |
            ## SDD Autonomous Implementation
            
            This PR was generated by the SDD Autonomous Loop for issue #${{ steps.issue.outputs.issue_number }}.
            
            **Issue**: ${{ steps.issue.outputs.issue_title }}
            
            **SDD Phases Completed**:
            - ✅ Propose: Change proposal created
            - ✅ Spec: Delta specifications written
            - ✅ Design: Technical design documented
            - ✅ Tasks: Implementation tasks planned
            - ✅ Apply: Code implemented
            - ✅ Verify: Tests passing
            - ✅ Archive: Delta specs synced
            
            **Verification**:
            - All tests pass: `go test -v -race ./...`
            - Build succeeds: `go build ./...`
            - Linting clean: `golangci-lint run`
            
            Closes #${{ steps.issue.outputs.issue_number }}
          labels: |
            autonomous
            sdd-generated
          draft: false

      - name: Comment on issue
        if: success()
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} --body "🤖 **SDD Autonomous Loop completed!**
          
          Implementation PR created: ${{ steps.sdd.outputs.branch }}
          
          The SDD phases executed:
          - ✅ Propose
          - ✅ Spec  
          - ✅ Design
          - ✅ Tasks
          - ✅ Apply
          - ✅ Verify
          - ✅ Archive
          
          Review the PR and merge when ready."

      - name: Comment on failure
        if: failure()
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} --body "❌ **SDD Autonomous Loop failed**
          
          Check the workflow run for details. The issue remains open for manual intervention.
          
          You can re-run with: \`gh workflow run sdd-autonomous.yml -f issue_number=${{ steps.issue.outputs.issue_number }}\`"