name: SDD Autonomous Loop

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  sdd-autonomous:
    if: github.event.label.name == 'autonomous' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download Go dependencies
        run: go mod tidy

      - name: Build ayrton CLI
        run: go build -o ayrton .

      - name: Get issue details
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUM)
          echo "issue_title=$(echo "$ISSUE_DATA" | jq -r .title)" >> $GITHUB_OUTPUT
          # Write body to file to avoid escaping issues
          echo "$ISSUE_DATA" | jq -r .body > /tmp/issue_body.txt
          echo "issue_body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/issue_body.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run SDD Autonomous Loop
        id: sdd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.issue.outputs.issue_body }}
        run: |
          set -e
          
          BRANCH="sdd/issue-${ISSUE_NUMBER}-$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-50)"
          git checkout -b "$BRANCH"
          
          echo "=== SDD Phase 1: PROPOSE ==="
          ./ayrton sdd propose --issue $ISSUE_NUMBER --title "$ISSUE_TITLE" --body "$ISSUE_BODY"
          
          echo "=== SDD Phase 2: SPEC ==="
          ./ayrton sdd spec --issue $ISSUE_NUMBER
          
          echo "=== SDD Phase 3: DESIGN ==="
          ./ayrton sdd design --issue $ISSUE_NUMBER
          
          echo "=== SDD Phase 4: TASKS ==="
          ./ayrton sdd tasks --issue $ISSUE_NUMBER
          
          echo "=== SDD Phase 5: APPLY ==="
          ./ayrton sdd apply --issue $ISSUE_NUMBER || true
          
          echo "=== SDD Phase 6: VERIFY ==="
          ./ayrton sdd verify --issue $ISSUE_NUMBER || go test -v -race ./...
          
          echo "=== SDD Phase 7: ARCHIVE ==="
          ./ayrton sdd archive --issue $ISSUE_NUMBER || true
          
          git push --force-with-lease origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Generate Documentation
        if: success()
        run: |
          chmod +x scripts/generate-docs.sh
          ./scripts/generate-docs.sh
          git add README.md CHANGELOG.md API.md 2>/dev/null || true
          git commit -m "docs: auto-generated documentation for issue #${{ steps.issue.outputs.issue_number }}" || echo "No doc changes"
          git push origin "${{ steps.sdd.outputs.branch }}"

      - name: Sync to Notion
        if: success() && env.NOTION_TOKEN != '' && env.NOTION_DATABASE_ID != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          chmod +x scripts/sync-notion.sh
          ./scripts/sync-notion.sh

      - name: Create Pull Request (optional)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write PR body to file
          cat > /tmp/pr_body.md << 'PRBODYEOF'
          ## SDD Autonomous Implementation
          
          This PR was generated by the SDD Autonomous Loop for issue #${{ steps.issue.outputs.issue_number }}.
          
          **Issue**: ${{ steps.issue.outputs.issue_title }}
          
          **SDD Phases Completed**:
          - ✅ Propose: Change proposal created
          - ✅ Spec: Delta specifications written
          - ✅ Design: Technical design documented
          - ✅ Tasks: Implementation tasks planned
          - ⚠️ Apply: Requires AI agent (see task list)
          - ✅ Verify: Tests passing
          - ⚠️ Archive: Placeholder
          
          **Documentation**: Auto-generated (README, CHANGELOG, API.md)
          **Notion**: Synced (if configured)
          
          **Next Steps**:
          - Review generated artifacts in `.atl/`
          - Implement tasks from `.atl/tasks/${{ steps.issue.outputs.issue_number }}.md`
          - Re-run workflow after implementation
          
          Closes #${{ steps.issue.outputs.issue_number }}
          PRBODYEOF
          
          # Try to create PR, but don't fail if no permission
          gh pr create \
            --repo ${{ github.repository }} \
            --base main \
            --head ${{ steps.sdd.outputs.branch }} \
            --title "SDD: ${{ steps.issue.outputs.issue_title }} (#${{ steps.issue.outputs.issue_number }})" \
            --body-file /tmp/pr_body.md \
            --label autonomous,sdd-generated || echo "::warning::Could not create PR (permission issue). Branch pushed: ${{ steps.sdd.outputs.branch }}"

      - name: Comment on issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} --body "🤖 **SDD Autonomous Loop completed (phases 1-4, 6)!**
          
          Implementation PR created: ${{ steps.sdd.outputs.branch }}
          
          **Generated artifacts**:
          - Proposal: \`.atl/proposals/${{ steps.issue.outputs.issue_number }}.md\`
          - Spec: \`.atl/specs/${{ steps.issue.outputs.issue_number }}.md\`
          - Design: \`.atl/designs/${{ steps.issue.outputs.issue_number }}.md\`
          - Tasks: \`.atl/tasks/${{ steps.issue.outputs.issue_number }}.md\`
          
          **Documentation**: README.md, CHANGELOG.md, API.md auto-generated
          **Notion**: Synced (if configured)
          
          **Next**: Implement tasks from the task list, then re-run workflow for apply/archive phases.
          
          Review the PR and merge when ready."

      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} --body "❌ **SDD Autonomous Loop failed**
          
          Check the workflow run for details. The issue remains open for manual intervention.
          
          You can re-run with: gh workflow run sdd-autonomous.yml -f issue_number=${{ steps.issue.outputs.issue_number }}"
